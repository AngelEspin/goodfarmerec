  #panel td:first-child { width:24px; }
  #panel td:last-child { text-align:right; color:#666; }
  #panel tr { cursor:pointer; }
  #panel tr:active { background:#f0f0f0; }
  .handle { text-align:center; padding:6px; color:#ccc; font-size:20px; cursor:pointer; user-select:none; }
  @media (max-width:480px) {

function haversine(lat1, lon1, lat2, lon2) {
    var R = 6371;
    var dlat = (lat2 - lat1) * Math.PI / 180;
    var dlon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dlat/2)*Math.sin(dlat/2) +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
            Math.sin(dlon/2)*Math.sin(dlon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function colorDist(km) {
    if (km < 5) return ['green','Muy cercano'];
    if (km < 20) return ['orange','Cercano'];
    return ['red','Lejano'];
}

var map = L.map('map', {zoomControl:true,zoomSnap:0.5,zoomDelta:1}).setView([FIXED_LAT,FIXED_LNG],9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:18}).addTo(map);

var markers = [];
var circles5 = null, circles20 = null;
var userMarker = null;

function updateDist(userLat, userLng) {
    var rows = '';
    var sorted = puntos.map(function(p) {
        p.dist = haversine(userLat, userLng, p.lat, p.lng);
        return p;
    }).sort(function(a,b){return a.dist-b.dist});

    sorted.forEach(function(p,i) {
        var c = colorDist(p.dist);
        var col = c[0], lbl = c[1];
        if (markers[i]) map.removeLayer(markers[i]);
        var icon = L.divIcon({
            html: '<div style="display:flex;align-items:center;gap:5px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4))">'
                + '<div style="background:'+col+';width:26px;height:26px;border-radius:50%;border:3px solid white;flex-shrink:0;"></div>'
                + '<span style="background:rgba(255,255,255,0.95);padding:4px 10px;border-radius:6px;font-size:clamp(13px,3.5vw,16px);font-weight:bold;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.15);">'+p.name+'</span>'
                + '</div>',
            className:'', iconSize:null, iconAnchor:[13,13]
        });
        var m = L.marker([p.lat,p.lng],{icon:icon}).addTo(map)
            .bindPopup('<b>'+p.sender+'</b><br>'+p.dist.toFixed(1)+' km<br><i>'+lbl+'</i>');
        markers[i] = m;
        rows += '<tr onclick="map.flyTo(['+p.lat+','+p.lng+'],14,{duration:1})"><td><i style="background:'+col+'"></i></td><td>'+p.name+'</td><td>'+p.dist.toFixed(1)+' km</td></tr>';
    });
    document.querySelector('#panel table').innerHTML = '<tr><th></th><th>Nombre</th><th>Distancia</th></tr>'+rows;
}

userMarker = L.marker([FIXED_LAT,FIXED_LNG],{
    icon: L.divIcon({
        html: '<div style="background:#2196F3;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 0 0 3px rgba(33,150,243,0.3);"></div>',
        className:'', iconSize:[18,18], iconAnchor:[9,9]
    })
}).addTo(map).bindPopup('<b>Ubicacion fija</b>');

circles5 = L.circle([FIXED_LAT,FIXED_LNG],{radius:5000,color:'green',fillColor:'green',fillOpacity:0.06,weight:2,opacity:0.4}).addTo(map);
circles20 = L.circle([FIXED_LAT,FIXED_LNG],{radius:20000,color:'orange',fillColor:'orange',fillOpacity:0.04,weight:2,opacity:0.3}).addTo(map);
