<!DOCTYPE html>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="icon" type="image/png" href="logo.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; overflow:hidden; height:100dvh; background:#f9f9f9; }
  #map { height:100dvh; width:100vw; }
  .return-btn { position:absolute; top:10px; left:10px; z-index:1001; background:#ed1922; color:white; border:none; padding:6px 14px; border-radius:8px; font-size:clamp(12px,3vw,14px); font-weight:bold; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.3); text-decoration:none; font-family:inherit; }
  .return-btn:hover { background:#c2161b; }
  .info-box { position:absolute; top:10px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,0.95); padding:6px 14px; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,0.2); z-index:1000; font-size:clamp(11px,3vw,14px); text-align:center; white-space:nowrap; max-width:95vw; }
  .loc-status { position:absolute; top:50px; left:50%; transform:translateX(-50%); z-index:1000; font-size:clamp(10px,2.5vw,12px); background:rgba(0,0,0,0.7); color:white; padding:4px 12px; border-radius:6px; white-space:nowrap; }
  .legend { background:white; padding:10px 14px; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,0.2); font-size:clamp(11px,2.5vw,13px); line-height:1.7; }
  .legend h4 { margin:0 0 4px 0; font-size:clamp(12px,3vw,14px); }
  .legend i { display:inline-block; width:14px; height:14px; border-radius:50%; margin-right:6px; vertical-align:middle; }
  .leaflet-popup-content { font-size:clamp(13px,3.5vw,15px); margin:8px 12px; }
  .leaflet-popup-content-wrapper { border-radius:10px; }
  .leaflet-control-zoom a { width:36px; height:36px; line-height:36px; font-size:20px; }
  #toggle-list { position:absolute; bottom:80px; right:10px; z-index:1000; background:white; border:none; border-radius:8px; padding:8px 12px; font-size:22px; box-shadow:0 2px 8px rgba(0,0,0,0.3); cursor:pointer; line-height:1; }
  #panel { position:absolute; bottom:0; left:0; right:0; z-index:999; background:rgba(255,255,255,0.97); max-height:40dvh; overflow-y:auto; border-radius:12px 12px 0 0; box-shadow:0 -4px 20px rgba(0,0,0,0.2); transition:transform 0.3s; transform:translateY(100%); }
  #panel.open { transform:translateY(0); }
  #panel table { width:100%; border-collapse:collapse; font-size:clamp(12px,3vw,14px); }
  #panel td, #panel th { padding:8px 10px; border-bottom:1px solid #eee; }
  #panel th { text-align:left; color:#666; font-weight:600; position:sticky; top:0; background:rgba(255,255,255,0.98); }
  #panel td:first-child { width:24px; }
  #panel td:last-child { text-align:right; color:#666; }
  #panel tr { cursor:pointer; }
  #panel tr:active { background:#f0f0f0; }
  .handle { text-align:center; padding:6px; color:#ccc; font-size:20px; cursor:pointer; user-select:none; }
  @media (max-width:480px) {
    .return-btn { top:6px; left:6px; padding:4px 10px; font-size:11px; }
    .info-box { top:6px; padding:4px 10px; }
    .loc-status { top:44px; }
    .legend { padding:8px 10px; }
    #panel td, #panel th { padding:6px 8px; }
  }
</style>
</head>
<body>
<button class="return-btn" onclick="window.location.href='index.html'">← RETURN</button>
<div class="info-box"><b>12/5/2026</b> | <b>27 procesos</b></div>
<div class="loc-status" id="loc-status">Obteniendo ubicacion...</div>
<div id="map"></div>
<button id="toggle-list">📋</button>
<div id="panel">
  <div class="handle" id="drag-handle">―</div>
  <table>
    <tr><th></th><th>Nombre</th><th>Distancia</th></tr>
  </table>
</div>
<script>
var puntos = [
    {lat:-0.977462,lng:-79.5259713,name:". - Angel Munoz",sender:". - Angel Muñoz"},
    {lat:-0.8071442,lng:-79.4772188,name:"Luis Mora",sender:"Luis Mora"},
    {lat:-3.1683783531188965,lng:-79.7997055053711,name:"Paul Ponguillo Calidad GF",sender:"Paul Ponguillo Calidad GF"},
    {lat:-1.5449489,lng:-79.4647117,name:"Marcos Sanchez Calidad GF",sender:"Marcos Sanchez Calidad GF"},
    {lat:-2.9114464,lng:-79.7771042,name:"Luis Arguello",sender:"Luis Arguello"},
    {lat:-1.9440117,lng:-79.5034,name:"Jean Carlos Garrido Calidad GF",sender:"Jean Carlos Garrido Calidad GF"},
    {lat:-3.6682637,lng:-80.1447363,name:"Fernando Sanchez",sender:"Fernando Sanchez"},
    {lat:-3.3705656,lng:-79.8737801,name:"Alex Wu",sender:"Alex Wu"},
    {lat:-0.8906533,lng:-79.2155,name:"Jackson Molina",sender:"Jackson Molina"},
    {lat:-1.5393211,lng:-79.4193193,name:"Darwin Gavilanes",sender:"Darwin Gavilanes"},
    {lat:-2.6188978,lng:-79.5645784,name:"MARLON ALAVA",sender:"MARLON ALAVA"},
    {lat:-3.1843893,lng:-79.8080851,name:"Richard Sebastian Garcia",sender:"Richard Sebastian Garcia"},
    {lat:-3.2897333,lng:-79.88441,name:"Roderick Cadena",sender:"Roderick Cadena 😎"},
    {lat:-1.9864503,lng:-79.379441,name:"Andres Rendon",sender:"-¡ Andrés Rendon"},
    {lat:-1.7583623,lng:-79.6605618,name:"Milton Fernandez",sender:"Milton Fernández"},
    {lat:-2.4219726,lng:-79.4712341,name:"Hugo Calderon",sender:"Hugo Calderón"},
    {lat:-1.7344888,lng:-79.5638278,name:"Estiven Santillan",sender:"Estiven Santillan"},
    {lat:-2.1523427,lng:-79.4225052,name:"Paul Rivera Calidad GF",sender:"Paul Rivera Calidad GF"},
    {lat:-1.7349343,lng:-79.5643579,name:". Christopher Mauricio Cortez",sender:". Christopher Mauricio Cortez"},
    {lat:-2.230534,lng:-79.5394528,name:"Biallo Miranda Calidad GF",sender:"Biallo Miranda Calidad GF"},
    {lat:-2.8077094554901123,lng:-79.75043487548828,name:"Danny.D",sender:"Danny.D"},
    {lat:-2.5101988315582275,lng:-79.56976318359375,name:"Ing. Agr. Jesus Bosquez Calidad GF",sender:"Ing. Agr. Jesus Bósquez Calidad GF"},
    {lat:-2.5892043113708496,lng:-79.55169677734375,name:"Roger Lopez",sender:"Roger Lopez"},
    {lat:-0.999005,lng:-79.3038967,name:"Edgar Villon Calidad GF",sender:"Edgar Villon Calidad GF"},
    {lat:-2.0042265,lng:-79.4033613,name:"i Luis Garcia",sender:"-i Luis Garcia"},
    {lat:-2.380254030227661,lng:-79.33894348144531,name:"Byron Parrales",sender:"Byron Parrales"},
    {lat:-1.311165,lng:-79.4154317,name:"Walter Contreras",sender:"Walter Contreras"}
];

function haversine(lat1, lon1, lat2, lon2) {
    var R = 6371;
    var dlat = (lat2 - lat1) * Math.PI / 180;
    var dlon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dlat/2)*Math.sin(dlat/2) +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
            Math.sin(dlon/2)*Math.sin(dlon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function colorDist(km) {
    if (km < 5) return ['green','Muy cercano'];
    if (km < 20) return ['orange','Cercano'];
    return ['red','Lejano'];
}

var map = L.map('map', {zoomControl:true,zoomSnap:0.5,zoomDelta:1}).setView([-1.8,-79.5],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:18}).addTo(map);

var markers = [];
var circles5 = null, circles20 = null;
var userMarker = null;
var ubicacionObtenida = false;

function mostrarTodos() {
    var rows = '';
    puntos.forEach(function(p,i) {
        var col = '#888';
        var icon = L.divIcon({
            html: '<div style="display:flex;align-items:center;gap:5px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4))">'
                + '<div style="background:'+col+';width:26px;height:26px;border-radius:50%;border:3px solid white;flex-shrink:0;"></div>'
                + '<span style="background:rgba(255,255,255,0.95);padding:4px 10px;border-radius:6px;font-size:clamp(13px,3.5vw,16px);font-weight:bold;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.15);">'+p.name+'</span>'
                + '</div>',
            className:'', iconSize:null, iconAnchor:[13,13]
        });
        var m = L.marker([p.lat,p.lng],{icon:icon}).addTo(map)
            .bindPopup('<b>'+p.sender+'</b>');
        markers[i] = m;
        rows += '<tr onclick="map.flyTo(['+p.lat+','+p.lng+'],14,{duration:1})"><td><i style="background:#888"></i></td><td>'+p.name+'</td><td>---</td></tr>';
    });
    document.querySelector('#panel table').innerHTML = '<tr><th></th><th>Nombre</th><th>Distancia</th></tr>'+rows;
}

function updateDist(userLat, userLng) {
    ubicacionObtenida = true;
    var rows = '';
    var sorted = puntos.map(function(p) {
        p.dist = haversine(userLat, userLng, p.lat, p.lng);
        return p;
    }).sort(function(a,b){return a.dist-b.dist});

    sorted.forEach(function(p,i) {
        var c = colorDist(p.dist);
        var col = c[0], lbl = c[1];
        if (markers[i]) map.removeLayer(markers[i]);
        var icon = L.divIcon({
            html: '<div style="display:flex;align-items:center;gap:5px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4))">'
                + '<div style="background:'+col+';width:26px;height:26px;border-radius:50%;border:3px solid white;flex-shrink:0;"></div>'
                + '<span style="background:rgba(255,255,255,0.95);padding:4px 10px;border-radius:6px;font-size:clamp(13px,3.5vw,16px);font-weight:bold;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.15);">'+p.name+'</span>'
                + '</div>',
            className:'', iconSize:null, iconAnchor:[13,13]
        });
        var m = L.marker([p.lat,p.lng],{icon:icon}).addTo(map)
            .bindPopup('<b>'+p.sender+'</b><br>'+p.dist.toFixed(1)+' km<br><i>'+lbl+'</i>');
        markers[i] = m;
        rows += '<tr onclick="map.flyTo(['+p.lat+','+p.lng+'],14,{duration:1})"><td><i style="background:'+col+'"></i></td><td>'+p.name+'</td><td>'+p.dist.toFixed(1)+' km</td></tr>';
    });
    document.querySelector('#panel table').innerHTML = '<tr><th></th><th>Nombre</th><th>Distancia</th></tr>'+rows;
}

function onLocation(e) {
    var lat = e.latlng.lat, lng = e.latlng.lng;
    document.getElementById('loc-status').textContent = 'Ubicacion: '+lat.toFixed(4)+', '+lng.toFixed(4);

    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([lat,lng],{
        icon: L.divIcon({
            html: '<div style="background:#2196F3;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 0 0 3px rgba(33,150,243,0.3);"></div>',
            className:'', iconSize:[18,18], iconAnchor:[9,9]
        })
    }).addTo(map).bindPopup('<b>Tu ubicacion</b>');

    if (circles5) map.removeLayer(circles5);
    if (circles20) map.removeLayer(circles20);
    circles5 = L.circle([lat,lng],{radius:5000,color:'green',fillColor:'green',fillOpacity:0.06,weight:2,opacity:0.4}).addTo(map);
    circles20 = L.circle([lat,lng],{radius:20000,color:'orange',fillColor:'orange',fillOpacity:0.04,weight:2,opacity:0.3}).addTo(map);

    updateDist(lat, lng);
    map.setView([lat,lng],8);
}

function onError(e) {
    document.getElementById('loc-status').textContent = 'Ubicacion no disponible - mostrando todos los puntos';
    mostrarTodos();
}

setTimeout(function() {
    if (!ubicacionObtenida) {
        document.getElementById('loc-status').textContent = 'Tiempo de espera - mostrando todos los puntos';
        mostrarTodos();
    }
}, 10000);

map.locate({setView:true,watch:true,enableHighAccuracy:true});
map.on('locationfound', onLocation);
map.on('locationerror', onError);

var panel = document.getElementById('panel');
var btn = document.getElementById('toggle-list');
var handle = document.getElementById('drag-handle');
function toggle() { panel.classList.toggle('open'); }
btn.onclick = toggle;
handle.onclick = toggle;

L.control({position:'bottomright'}).onAdd = function() {
    var d = L.DomUtil.create('div','legend');
    d.innerHTML = '<h4>Distancia a ti</h4><i style="background:green"></i> &lt; 5 km<br><i style="background:orange"></i> 5-20 km<br><i style="background:red"></i> &gt; 20 km';
    return d;
}.addTo(map);
</script>
</body>
</html>
